<style>
/* 页脚胶囊徽标 */
.foot-capsule {
  position: relative;
  display: inline-flex;
  align-items: center;
  padding: 6px 16px;
  border-radius: 999px;
  overflow: hidden;
  background: #1a1a1a;
}
/* 彩虹渐变流光 */
.foot-rainbow {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    #ff3366, #ff6633, #ffcc00, #99ff33,
    #33ff99, #33ccff, #6666ff, #cc33ff, #ff33cc
  );
  background-size: 1200% 100%;
  animation: logoFlow 10s linear infinite;
  opacity: 0.4;
  z-index: 1;
  pointer-events: none;
}
@keyframes logoFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
/* 徽标文字 */
.foot-logo-text {
  position: relative;
  z-index: 2;
  color: #fff;
  font-size: 14px;
  white-space: nowrap;
}
/* 运行时间炫彩文字 */
.foot-time {
  margin-top: 6px;
  font-size: 12px;
  background: linear-gradient(90deg,
    #ff3366, #ff6633, #ffcc00, #99ff33,
    #33ff99, #33ccff, #6666ff, #cc33ff, #ff33cc
  );
  background-size: 1200% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: logoFlow 8s linear infinite;
  white-space: nowrap;
}
</style>

<!-- 页脚内容 -->
<div style="text-align:center; padding:10px 0;">
  <div class="foot-capsule">
    <div class="foot-rainbow"></div>
    <div class="foot-logo-text">枪宴のBlog</div>
  </div>
  <div class="foot-time" id="runTime">本站已运行 0 天 0 时 0 分 0 秒</div>
</div>

<script>
// 👇 这里改成你网站真实的上线时间！
const startTime = new Date("2022-03-03 00:00:00");

function updateRunTime() {
  const now = new Date();
  const diff = (now - startTime) / 1000;

  // 如果当前时间早于上线时间，就显示 0
  if (diff < 0) {
    document.getElementById("runTime").innerText = "本站已运行 0 天 0 时 0 分 0 秒";
    return;
  }

  const d = Math.floor(diff / 86400);
  const h = Math.floor((diff % 86400) / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = Math.floor(diff % 60);

  const el = document.getElementById("runTime");
  if (el) {
    el.innerText = `本站已运行 ${d}天 ${h}时 ${m}分 ${s}秒`;
  }
}

// 确保 DOM 加载完成后再执行
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", function() {
    updateRunTime();
    setInterval(updateRunTime, 1000);
  });
} else {
  updateRunTime();
  setInterval(updateRunTime, 1000);
}
</script>
